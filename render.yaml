services:
  - type: web
    name: foodvision-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt && python warmup.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: HF_HUB_DISABLE_SYMLINKS_WARNING
        value: "1"
